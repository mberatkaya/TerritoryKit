name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 11.7.0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm verify
      - if: matrix.node == 24
        run: pnpm --filter @territory-kit/example-web-maplibre exec playwright install chromium --with-deps
      - if: matrix.node == 24
        run: pnpm test:visual:maplibre
