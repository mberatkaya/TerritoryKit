name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages to npm after verification"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.repository == 'mberatkaya/TerritoryKit' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: pnpm bundle:size

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check npm publish authentication
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && (github.event_name == 'push' || inputs.publish == 'true') }}
        env:
          NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "$NPM_TOKEN_PRESENT" = "true" ]; then
            echo "Using NPM_TOKEN secret for npm publish."
          else
            echo "::notice title=NPM publish auth::NPM_TOKEN secret is not set. Publish will rely on npm Trusted Publishing. Configure every published package on npm with GitHub owner 'mberatkaya', repository 'TerritoryKit', workflow filename 'release.yml', no environment, and allowed action 'npm publish'."
          fi

      - name: Publish packages to npm
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && (github.event_name == 'push' || inputs.publish == 'true') }}
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_ACCESS: "public"
          NPM_CONFIG_PROVENANCE: "true"
          PNPM_CONFIG_ACCESS: "public"
          PNPM_CONFIG_PROVENANCE: "true"
