name: Bug report
description: Report a reproducible TerritoryKit bug.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include dataset snippet, API call, command, or example steps.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package
      placeholder: "@territory-kit/core"
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0-alpha.1"
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
