name: Feature request
description: Propose a new TerritoryKit capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or integration problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, package, command, or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dataset
        - core
        - map adapter
        - backend integration
        - CLI/generator
        - docs
        - release
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
